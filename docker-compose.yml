networks:
  pipeline-net:
    driver: bridge
    name: pipeline-net

volumes:
  jenkins-data:
    name: s07-jenkins-data

  reports_data:
    name: s07-nginx-reports-data

services:

  jenkins:
    build:
      # Aponta para a pasta do Jenkins
      context: ./jenkins
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace:ro
    networks:
      - pipeline-net
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
      - DISPLAY=:99
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Portal Nginx Customizado
  nginx:
    build:
      # Aponta para a pasta do Nginx
      context: ./nginx
    container_name: nginx_relatorios
    ports:
      # Para acessar não precisa especificar a porta depois do IP: http://localhost
      - "80:80"
    volumes:
      # Mapeia o volume para a subpasta /relatorios da página inicial
      - reports_data:/usr/share/nginx/html/relatorios

  k6:
    image: grafana/k6:latest
    container_name: k6
    networks:
      - pipeline-net
    volumes:
      - ..:/workspace:ro
      - reports_data:/reports
    working_dir: /workspace/pipeline/k6
    entrypoint: ["tail", "-f", "/dev/null"]
    depends_on:
      jenkins:
        condition: service_healthy


